# Aortica production reverse proxy — TLS termination + SPA + API/docs proxy.
#
# Routes:
#   /            → React SPA (static assets, client-side routing fallback)
#   /api/        → FastAPI backend  (api:8000)
#   /docs/       → MkDocs site       (docs:8001)
#   /healthz     → proxy liveness probe
#
# TLS uses a self-signed certificate mounted at /etc/nginx/certs (see `make certs`).

# Redirect all plain HTTP to HTTPS (except the health probe).
server {
    listen 80;
    listen [::]:80;
    server_name _;

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/aortica.crt;
    ssl_certificate_key /etc/nginx/certs/aortica.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Reasonable upload ceiling for ECG files.
    client_max_body_size 25m;

    # ── Liveness probe ───────────────────────────────────────────────
    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ── FastAPI backend ──────────────────────────────────────────────
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Backend health/info/openapi passthrough.
    location ~ ^/(health|info|openapi\.json|docs-api|redoc)$ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── MkDocs documentation site ────────────────────────────────────
    location /docs/ {
        proxy_pass http://docs:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── React SPA (static assets + client-side routing) ──────────────
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
