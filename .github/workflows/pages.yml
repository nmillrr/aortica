name: Deploy Site (Landing + Docs)

# Publishes the aortica.io landing page at the Pages root and the MkDocs
# documentation site under /docs/. Single deployer for GitHub Pages so the two
# artifacts never race for the site root.

on:
  push:
    branches:
      - main
    paths:
      - 'landing/**'
      - 'docs/**'
      - 'mkdocs.yml'
      - 'aortica/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install mkdocs-material "mkdocstrings[python]"

      - name: Build documentation
        run: mkdocs build --strict

      - name: Assemble site (landing at root, docs under /docs)
        run: |
          rm -rf _site
          mkdir -p _site
          cp -r landing/. _site/
          mkdir -p _site/docs
          cp -r site/. _site/docs/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
